# Elevator HMI configuration
# Connect to the same MQTT broker the control system publishes to.

# NOTE: the HMI reads its config from JVM system properties / env vars, NOT from this
# file (it has no classpath loader). The values below document the expected settings;
# pass them at launch, e.g.:
#   mvn exec:java -Dexec.mainClass=de.htwg.sysarch.hmi.HmiSwingApplication \
#       "-Dmqtt.host=localhost" "-Dmqtt.username=<user>" "-Dmqtt.password=<pass>"
# When tunnelling the lab broker to the laptop (ssh -L 1883:localhost:1883 ...),
# use mqtt.host=localhost.
#
# mqtt.host=localhost           (or ea-pc165... when on HTWG VPN without a tunnel)
# mqtt.port=1883
# mqtt.baseTopic=/SysArch/E     (must match the control system)
# mqtt.username / mqtt.password (broker credentials; via -D or MQTT_USERNAME/MQTT_PASSWORD)
