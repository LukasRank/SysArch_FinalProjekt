# Elevator HMI configuration
# Connect to the same MQTT broker the control system publishes to.

# Lab broker: mosquitto on ea-pc165 (HTWG VPN).
# For offline dev run a local broker: mosquitto -v  (listens on localhost:1883)
mqtt.host=ea-pc165.ei.htwg-konstanz.de
mqtt.port=1883

# Must match the control system's mqtt.baseTopic.
# Control system (Group E / C2) publishes under elevator/e
mqtt.baseTopic=elevator/e
