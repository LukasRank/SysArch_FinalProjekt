# Elevator Control System configuration — Group E (C2)
# See CLAUDE.md §7 for details.

# Modbus slave (the lab PLC simulation). Reachable from the lab or HTWG VPN only.
modbus.host=ea-pc111.ei.htwg-konstanz.de
modbus.port=506

# Control loop cycle time in milliseconds (assignment suggests ~100 ms).
control.cycleMillis=100

# Group letter (drives the simulation URLs aufzug{group}simu.htm / ctrl.htm).
elevator.group=e

# HMI transport (MQTT). Activated with the --mqtt flag (CLAUDE.md §8).
# Lab broker: mosquitto on ea-pc165 (HTWG VPN). For offline dev run a local broker
# (e.g. `brew install mosquitto && mosquitto -v`) and keep localhost below.
mqtt.host=localhost
mqtt.port=1883
# Base topic; status/event/cmd are appended. Defaults to elevator/<group>.
mqtt.baseTopic=elevator/e
