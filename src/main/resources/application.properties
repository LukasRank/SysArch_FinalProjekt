# Elevator Control System configuration — Group E (C2)
# See CLAUDE.md §7 for details.

# Modbus slave (the lab PLC simulation). Reachable from the lab or HTWG VPN only.
modbus.host=ea-pc111.ei.htwg-konstanz.de
modbus.port=506

# Control loop cycle time in milliseconds (assignment suggests ~100 ms).
control.cycleMillis=100

# Group letter (drives the simulation URLs aufzug{group}simu.htm / ctrl.htm).
elevator.group=e
